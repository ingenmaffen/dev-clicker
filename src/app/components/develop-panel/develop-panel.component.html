<div class="develop-panel">
    <ng-container *ngFor="let app of appTypes">
        <button (click)="developApp(app.type)" class="common-button" [disabled]="isButtonDisabled(app.type)">
            <div class="left-side">
                <img [src]="app.icon" [alt]="app.type" />
                <span>Develop {{ app.type }} App</span>
            </div>
            <div class="right-side">{{ getDevelopmentTime(app.type) }}</div>
        </button>
    </ng-container>
</div>
